syntax = "proto3";
package shared.v1;

import "shared/v1/gateway_common.proto";
import "shared/v1/options.proto";
import "shared/v1/webhook_events.proto";

option go_package = "github.com/pinealctx/nexus-proto/gen/go/shared/v1;sharedv1";

// ═══════════════════════════════════════════════════════════════
// Agent Upstream (Agent → Gateway)
// ═══════════════════════════════════════════════════════════════

// AgentClientFrame is the upstream frame sent by an agent over WebSocket.
message AgentClientFrame {
  // Request ID for request-response correlation.
  int64 request_id = 1;
  // Frame type discriminator.
  AgentClientFrameType type = 2;
  // Frame payload.
  oneof payload {
    // Authentication request.
    AgentAuthRequest auth_request = 10;
    // Heartbeat ping.
    HeartbeatPing heartbeat_ping = 11;
  }
}

// AgentClientFrameType enumerates upstream frame types.
enum AgentClientFrameType {
  // Unspecified.
  AGENT_CLIENT_FRAME_TYPE_UNSPECIFIED = 0;
  // Authentication request carrying agent token.
  AGENT_CLIENT_FRAME_TYPE_AUTH_REQUEST = 1;
  // Heartbeat keepalive ping.
  AGENT_CLIENT_FRAME_TYPE_HEARTBEAT_PING = 2;
}

// AgentAuthRequest carries the agent token for WebSocket authentication.
message AgentAuthRequest {
  // Agent Token (nxa_ prefix).
  string token = 1 [(sensitive) = true];
}

// ═══════════════════════════════════════════════════════════════
// Agent Downstream (Gateway → Agent)
// ═══════════════════════════════════════════════════════════════

// AgentServerFrame is the downstream frame sent by the gateway to an agent.
message AgentServerFrame {
  // Request ID for request-response correlation.
  int64 request_id = 1;
  // Frame type discriminator.
  AgentServerFrameType type = 2;
  // Frame payload.
  oneof payload {
    // Authentication response.
    GatewayAuthResponse auth_response = 10;
    // Event push.
    AgentEventPush event_push = 11;
    // Heartbeat pong.
    HeartbeatPong heartbeat_pong = 12;
    // Error notification.
    GatewayErrorFrame error = 13;
  }
}

// AgentServerFrameType enumerates downstream frame types.
enum AgentServerFrameType {
  // Unspecified.
  AGENT_SERVER_FRAME_TYPE_UNSPECIFIED = 0;
  // Authentication result.
  AGENT_SERVER_FRAME_TYPE_AUTH_RESPONSE = 1;
  // Event push carrying a WebhookEvent.
  AGENT_SERVER_FRAME_TYPE_EVENT_PUSH = 2;
  // Heartbeat pong response.
  AGENT_SERVER_FRAME_TYPE_HEARTBEAT_PONG = 3;
  // Error notification.
  AGENT_SERVER_FRAME_TYPE_ERROR = 4;
}

// AgentEventPush wraps a WebhookEvent for WebSocket delivery.
message AgentEventPush {
  // Reuses the same WebhookEvent structure, ensuring consistent
  // business data between Webhook and WebSocket modes.
  WebhookEvent event = 1;
}
